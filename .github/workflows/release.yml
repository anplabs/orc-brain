name: Release

# Publishes every workspace package to npm when a version tag is pushed
# (e.g. `git tag v1.1.0 && git push origin v1.1.0`). The tag must match the
# version in the package.json files — `pnpm -r publish` skips versions that
# already exist on the registry, so re-runs are safe.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Least privilege: read the repo, mint an OIDC token for npm trusted
# publishing (which also provides provenance). Auth is OIDC-only — each
# package must list this repo + `release.yml` as a Trusted Publisher on
# npmjs.com (Settings → Trusted publishing). No NPM_TOKEN is used: npm
# requires 2FA or a bypass-2FA token for token publishes, and bypass-2FA
# tokens are deprecated (removal ~Jan 2027).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build · test · publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version is read from the root package.json "packageManager" field.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # No registry-url: it writes an ${NODE_AUTH_TOKEN} .npmrc entry,
          # which shadows OIDC auth. pnpm publishes to npmjs.org by default.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm -r publish` silently skips versions that already exist, so a
      # tag that doesn't match package.json would "succeed" while publishing
      # nothing. Fail loudly instead. (Skipped on workflow_dispatch runs.)
      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match package.json version $version." >&2
            echo "Run 'pnpm bump $tag', commit, and re-tag." >&2
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish
        run: pnpm -r publish --access public --no-git-checks --provenance
